<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verifier - MailTester Ninja</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: #f8f9ff;
    }

    .upload-area:hover {
      border-color: #764ba2;
      background: #f0f2ff;
    }

    .upload-area.dragging {
      border-color: #764ba2;
      background: #e8ebff;
    }

    .upload-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #333;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .upload-hint {
      color: #999;
      font-size: 12px;
    }

    #fileInput {
      display: none;
    }

    .status-section {
      margin-top: 30px;
      padding: 20px;
      background: #f8f9ff;
      border-radius: 8px;
      display: none;
    }

    .status-section.show {
      display: block;
    }

    .status-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .status-info {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    .upload-id {
      background: #e8ebff;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
      font-family: monospace;
      color: #667eea;
      word-break: break-all;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #764ba2;
    }

    .btn-secondary {
      background: #e8ebff;
      color: #667eea;
    }

    .btn-secondary:hover {
      background: #d4daf7;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading {
      display: flex;
      align-items: center;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 13px;
    }

    .success {
      background: #efe;
      color: #3c3;
      padding: 12px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📧 Email Verifier</h1>
    <p class="subtitle">Upload CSV → Get verified results</p>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <div class="upload-text">Drop your CSV file here</div>
      <div class="upload-hint">or click to select</div>
      <input type="file" id="fileInput" accept=".csv" />
    </div>

    <div class="status-section" id="statusSection">
      <div class="status-title">Upload Details</div>
      <div class="status-info">
        <div>Total Emails: <strong id="totalEmails">-</strong></div>
        <div>Status: <strong id="status">-</strong></div>
        <div>Upload ID:</div>
        <div class="upload-id" id="uploadId">-</div>
      </div>
      <button class="btn btn-secondary" onclick="checkStatus()">🔄 Check Status</button>
      <button class="btn btn-primary" onclick="downloadResults()" id="downloadBtn" style="display: none;">⬇️ Download Results</button>
      <div id="message"></div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const statusSection = document.getElementById('statusSection');

    // Upload area interactions
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragging');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragging');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragging');
      const files = e.dataTransfer.files;
      if (files.length) handleFileUpload(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFileUpload(e.target.files[0]);
    });

    async function handleFileUpload(file) {
      const formData = new FormData();
      formData.append('file', file);

      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = '<div class="loading"><span class="spinner"></span> Uploading...</div>';

      try {
        const response = await fetch('/upload', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Upload failed');
        }

        // Show status section
        statusSection.classList.add('show');
        document.getElementById('uploadId').textContent = data.uploadId;
        document.getElementById('totalEmails').textContent = data.totalEmails;
        document.getElementById('status').textContent = 'Processing...';

        messageDiv.innerHTML = '<div class="success">✓ Upload successful! Verifying emails...</div>';

        // Start checking status
        window.currentUploadId = data.uploadId;
        checkStatusInterval(data.uploadId);

      } catch (error) {
        messageDiv.innerHTML = `<div class="error">✗ ${error.message}</div>`;
      }
    }

    async function checkStatus() {
      const uploadId = window.currentUploadId;
      if (!uploadId) return;

      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = '<div class="loading"><span class="spinner"></span> Checking status...</div>';

      try {
        const response = await fetch(`/status/${uploadId}`);
        const data = await response.json();

        document.getElementById('status').textContent = data.status;

        if (data.status === 'completed') {
          messageDiv.innerHTML = '<div class="success">✓ Verification complete!</div>';
          document.getElementById('downloadBtn').style.display = 'inline-block';
        } else {
          messageDiv.innerHTML = '<div class="success">Status updated. Checking again in 30 seconds...</div>';
          setTimeout(() => checkStatusInterval(uploadId), 30000);
        }
      } catch (error) {
        messageDiv.innerHTML = `<div class="error">✗ ${error.message}</div>`;
      }
    }

    function checkStatusInterval(uploadId) {
      setTimeout(() => checkStatus(), 30000);
    }

    function downloadResults() {
      const uploadId = window.currentUploadId;
      if (uploadId) {
        window.location.href = `/download/${uploadId}`;
      }
    }
  </script>
</body>
</html>
